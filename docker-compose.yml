version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: itsm-postgres
    environment:
      POSTGRES_USER: itsm_user
      POSTGRES_PASSWORD: itsm_password
      POSTGRES_DB: itsm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
